# Training Configuration
env:
  grid_size: 20
  render_mode: null

hyperparameters:
  learning_rate: 0.0003
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01

training:
  total_timesteps: 100000
  eval_freq: 10000
  n_eval_episodes: 10
  save_path: "models/snake_ppo_model"
  best_model_path: "models/best_model"
